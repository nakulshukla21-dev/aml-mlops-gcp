# Full training profile — 200k transactions, production-shaped paths.
profile: train

gcp:
  project_id: aml-mlops-demo-498203
  region: us-central1

storage:
  bucket: aml-mlops-nakul
  raw_prefix: transactions/raw
  output_filename: transactions.csv
  dimensions_dir: dimensions

bigquery:
  dataset: aml_mlops
  raw_table: raw_transactions
  # Data arch v2 — bank clients separate from counterparties
  dim_customer_table: dim_customer
  dim_counterparty_table: dim_counterparty
  dim_account_table: dim_account
  dim_counterparty_account_table: dim_counterparty_account
  beneficial_owner_table: beneficial_owner
  ref_country_table: ref_country
  ref_state_table: ref_state
  ref_naics_table: ref_naics
  ref_product_table: ref_product
  staging_table: raw_transactions_staging
  features_base_view: features_base
  features_velocity_view: features_velocity
  features_network_view: features_network
  features_view: features_training
  features_eval_view: features_eval
  features_train_view: features_train
  features_val_view: features_val
  features_test_view: features_test
  location: US

splits:
  train_end: "2024-09-30"   # train: Jan 1 – Sep 30
  val_end: "2024-10-31"     # val: Oct; test: Nov – Dec

data_generation:
  n_transactions: 200000
  fraud_rate: 0.02
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  random_seed: 42

# Post-generation noise — applied after clean typology generation.
noise:
  enabled: true
  label_flip_rate: 0.008          # ~0.8% imperfect labels
  missing_optional_field_rate: 0.04
  dirty_enum_rate: 0.03           # WIRE vs wire, USA vs US
  memo_truncate_rate: 0.05
  timestamp_jitter_rate: 0.03
  timestamp_jitter_max_hours: 48
  amount_jitter_rate: 0.02
  external_receiver_metadata_rate: 0.80  # null receiver age/shell for external txs
  merchant_name_typo_rate: 0.04

automl:
  display_name_prefix: aml-fraud
  automl_input_view: features_automl
  target_column: is_fraud
  split_column: ml_split
  optimization_objective: maximize-au-prc
  budget_milli_node_hours: 8000   # 8 node hours — full 200k train profile
  model_display_name: aml-fraud-automl
  predictions_table_prefix: automl_predictions
  batch_predict_machine_type: n1-standard-4
  excluded_columns:
    - transaction_id
    - timestamp
    - txn_date
    - sender_account
    - receiver_account
    - sender_account_id
    - sender_counterparty_account_id
    - receiver_account_id
    - receiver_counterparty_account_id
    - ml_split

deployment:
  endpoint_display_name: aml-fraud-endpoint
  deployed_model_display_name: aml-fraud-scorer
  machine_type: n1-standard-2
  min_replica_count: 1
  max_replica_count: 1
